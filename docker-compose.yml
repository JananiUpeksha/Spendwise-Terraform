services:
  db:
    image: postgres:16-alpine
    container_name: spendwise_db
    environment:
      POSTGRES_USER: spendwise
      POSTGRES_PASSWORD: spendwise123
      POSTGRES_DB: spendwise
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spendwise_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: spendwise_backend
    environment:
      DATABASE_URL: postgresql://spendwise:spendwise123@db:5432/spendwise
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: spendwise_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
